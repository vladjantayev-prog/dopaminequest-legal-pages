<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DopamineQuest</title>
  <style>
    :root{
      --bg:#060812; --panel:rgba(255,255,255,.05); --panel-border:rgba(255,255,255,.10);
      --text:#fff; --muted:rgba(255,255,255,.70); --muted2:rgba(255,255,255,.45);
      --shadow:0 0 60px rgba(87,181,255,.10); --max:1200px;
    }
    *{box-sizing:border-box} html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Segoe UI",Arial,sans-serif}
    a{color:inherit;text-decoration:none}
    .bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;background:
      radial-gradient(520px 260px at 50% -2%, rgba(34,211,238,.10), transparent 70%),
      radial-gradient(360px 360px at 92% 28%, rgba(217,70,239,.10), transparent 65%),
      radial-gradient(320px 320px at 6% 78%, rgba(59,130,246,.10), transparent 65%), linear-gradient(180deg,#060812 0%, #060812 100%);z-index:0}
    .wrap{position:relative;z-index:1}.container{max-width:var(--max);margin:0 auto;padding:0 24px}
    header{display:flex;justify-content:space-between;align-items:center;padding:24px 0}.brand{font-size:20px;font-weight:700}
    .lang{display:flex;gap:6px;padding:6px;border:1px solid var(--panel-border);background:var(--panel);backdrop-filter: blur(12px);border-radius:999px}
    .lang button{appearance:none;border:0;background:transparent;color:var(--muted);padding:10px 16px;border-radius:999px;cursor:pointer;font-weight:600}
    .lang button.active{background:#fff;color:#000}
    .hero{display:grid;grid-template-columns:1.1fr .9fr;gap:56px;align-items:center;padding:12px 0 80px}
    .badge{display:inline-flex;align-items:center;padding:10px 16px;border-radius:999px;border:1px solid rgba(34,211,238,.20);background:rgba(34,211,238,.12);color:#bff4ff;font-size:14px;margin-bottom:24px}
    h1{font-size:72px;line-height:.96;letter-spacing:-.05em;margin:0;max-width:680px}
    .lead{font-size:22px;line-height:1.6;color:var(--muted);max-width:720px;margin:24px 0 0}
    .cta{display:flex;gap:14px;flex-wrap:wrap;margin-top:28px}.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 22px;border-radius:18px;font-size:14px;font-weight:700}
    .btn.primary{background:#fff;color:#000;box-shadow:0 20px 40px rgba(255,255,255,.08)}.btn.secondary{border:1px solid var(--panel-border);background:var(--panel);color:#fff}
    .links{display:flex;gap:18px;flex-wrap:wrap;margin-top:22px;color:var(--muted2);font-size:14px}
    .phone{width:360px;max-width:100%;margin-left:auto;border-radius:44px;padding:12px;border:1px solid var(--panel-border);background:var(--panel);backdrop-filter:blur(16px);box-shadow:0 0 80px rgba(87,181,255,.16)}
    .screen{border-radius:36px;overflow:hidden;border:1px solid var(--panel-border);background:#0b1020;aspect-ratio:9/19.5;position:relative}
    .screen img{display:block;width:100%;height:100%;object-fit:cover}
    .fallback{position:absolute;inset:0;padding:24px;background:linear-gradient(180deg,#10172b 0%, #080b14 100%);display:flex;flex-direction:column;gap:16px}
    .pill{width:96px;height:6px;border-radius:999px;background:rgba(255,255,255,.20);margin:0 auto 6px}.card{border:1px solid var(--panel-border);background:rgba(255,255,255,.05);border-radius:28px}
    section{padding:72px 0}.titleblock{max-width:860px;margin:0 auto 36px;text-align:center}
    .titleblock h2{font-size:48px;line-height:1.05;letter-spacing:-.04em;margin:0}.titleblock p{font-size:19px;line-height:1.7;color:var(--muted);margin:16px auto 0}
    .features{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    .feature{padding:24px;border:1px solid var(--panel-border);background:var(--panel);border-radius:28px;backdrop-filter:blur(14px);box-shadow:var(--shadow)}
    .icon{width:40px;height:40px;border-radius:16px;background:rgba(34,211,238,.10);border:1px solid rgba(34,211,238,.20);margin-bottom:18px}
    .feature h3{font-size:24px;line-height:1.18;letter-spacing:-.03em;margin:0}.feature p{margin:12px 0 0;color:var(--muted);line-height:1.75}
    .journey{padding:36px;border:1px solid var(--panel-border);background:var(--panel);border-radius:32px;backdrop-filter:blur(16px)} .journey-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:22px}
    .step{padding:18px;border-radius:22px;border:1px solid var(--panel-border);background:rgba(0,0,0,.20);font-size:14px;line-height:1.7;color:rgba(255,255,255,.82)} .step .n{display:block;color:#bff4ff;letter-spacing:.18em;text-transform:uppercase;font-size:11px;margin-bottom:10px}
    .gallery-note{text-align:center;color:var(--muted2);font-size:14px;margin:-8px 0 28px}.shots{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
    .shot{padding:12px;border:1px solid var(--panel-border);background:var(--panel);border-radius:28px;backdrop-filter:blur(14px)} .shot .screen{border-radius:26px}
    .final{text-align:center;padding:48px;border:1px solid var(--panel-border);background:var(--panel);border-radius:32px;backdrop-filter:blur(16px);box-shadow:var(--shadow)} .final h2{font-size:48px;line-height:1.05;letter-spacing:-.04em;margin:0}
    .final p{margin:14px 0 0;color:var(--muted);font-size:20px}.final .accent{margin-top:24px;color:#bff4ff;font-size:28px;font-weight:600}
    footer{border-top:1px solid var(--panel-border);margin-top:32px}.foot{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:26px 0;color:var(--muted2);font-size:14px}.foot-links{display:flex;gap:18px;flex-wrap:wrap}
    @media (max-width: 1024px){.hero{grid-template-columns:1fr;gap:32px}.phone{margin:0 auto}.features{grid-template-columns:1fr 1fr}.shots{grid-template-columns:1fr 1fr}.journey-grid{grid-template-columns:1fr 1fr 1fr}h1{font-size:58px}.titleblock h2,.final h2{font-size:40px}}
    @media (max-width: 680px){header{padding:18px 0}.container{padding:0 18px}h1{font-size:46px}.lead{font-size:18px}.features,.shots,.journey-grid{grid-template-columns:1fr}.titleblock h2,.final h2{font-size:34px}.foot{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="container">
    <header>
      <div class="brand">DopamineQuest</div>
      <div class="lang">
        <button id="btn-en" class="active">EN</button>
        <button id="btn-ru">RU</button>
      </div>
    </header>

    <section class="hero">
      <div>
        <div class="badge" id="badge"></div>
        <h1 id="hero-title"></h1>
        <p class="lead" id="hero-subtitle"></p>
        <div class="cta">
          <a class="btn primary" id="cta-primary" href="#how-it-works"></a>
          <a class="btn secondary" id="cta-secondary" href="#screenshots"></a>
        </div>
        <div class="links">
          <a href="https://dopaminequest.app/privacy">Privacy Policy</a>
          <a href="https://dopaminequest.app/terms">Terms of Use</a>
          <a href="https://dopaminequest.app/support">Support</a>
        </div>
      </div>
      <div class="phone">
        <div class="screen">
          <img id="hero-image" src="/screens/en/1.jpg" alt="DopamineQuest preview" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="fallback" style="display:none">
            <div class="pill"></div><div class="card" style="height:64px"></div><div class="card" style="height:160px"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div class="card" style="height:140px"></div><div class="card" style="height:140px"></div></div>
          </div>
        </div>
      </div>
    </section>

    <section><div class="titleblock"><h2 id="pain-title"></h2><p id="pain-body"></p></div></section>

    <section id="how-it-works"><div class="titleblock"><h2 id="features-title"></h2></div><div class="features" id="features"></div></section>

    <section><div class="journey"><div class="titleblock" style="margin-bottom:18px"><h2 id="journey-title"></h2></div><div class="journey-grid" id="journey-grid"></div></div></section>

    <section id="screenshots">
      <div class="titleblock"><h2 id="gallery-title"></h2><p id="gallery-intro" style="display:none"></p></div>
      <div class="shots" id="shots"></div>
    </section>

    <section>
      <div class="final">
        <h2 id="final-title"></h2>
        <p id="final-body"></p>
        <div class="accent" id="final-cta"></div>
        <div class="cta" style="justify-content:center"><a class="btn primary" id="bottom-cta" href="#screenshots"></a></div>
      </div>
    </section>

    <footer><div class="foot"><div>DopamineQuest</div><div class="foot-links"><a href="https://dopaminequest.app/privacy">Privacy Policy</a><a href="https://dopaminequest.app/terms">Terms of Use</a><a href="https://dopaminequest.app/support">Support</a></div></div></footer>
  </div>
</div>

<script>
const data = {
en: {
badge:"Break the procrastination loop",
heroTitle:"Get back into real action.",
heroSubtitle:"DopamineQuest helps you break out of scrolling, stop overthinking, and get back into real action.",
ctaPrimary:"See how it works",
ctaSecondary:"View screenshots",
painTitle:"When starting feels overwhelming",
painBody:"When a task feels too big and guilt keeps building, starting can feel overwhelming. DopamineQuest reduces friction, cuts through the noise, and helps you move again through a system of micro-steps, short reset tasks, and intelligent support.",
featuresTitle:"How DopamineQuest helps you move forward",
features:[
["AI Coach gets you unstuck","When a task feels too big or intimidating, Neuro Coach helps break it into clear, doable next steps."],
["Short tasks help you start gently","Build momentum through simple action instead of overwhelming lists."],
["Photo proof turns small steps into real progress","Complete micro-steps and verify them with real photos for visible proof that you are moving again."],
["Smart camera helps you recharge through movement","Count reps and check form automatically to wake up your body and clear your mind."],
["Player and Hero challenges help you grow","Move from small wins into bigger real-life changes in focus, habits, health, and daily action."]
],
journeyTitle:"From stuck to moving to changing your life",
journey:["Stop spiraling in your head","Get back in control","Take one simple action","Build trust in yourself again","Turn small wins into real-life change"],
galleryTitle:"Suggested screenshots",
galleryIntro:"",
shots:["Break the procrastination loop","When starting feels impossible","Get back in control","AI Coach gets you unstuck","Recharge through movement. AI Coach guides you","Start with one simple action","Small steps. Real progress","Change your life one step at a time"],
finalTitle:"You do not need a perfect plan.",
finalBody:"You just need the first step.",
finalCta:"Take one small step today. Momentum will follow."
},
ru: {
badge:"Разорви цикл прокрастинации",
heroTitle:"Вернись к реальным делам.",
heroSubtitle:"DopamineQuest помогает выйти из залипания, перестать бездумно листать ленту и вернуться к реальным делам.",
ctaPrimary:"Как это работает",
ctaSecondary:"Смотреть скрины",
painTitle:"Когда начать слишком сложно",
painBody:"Когда задача кажется слишком большой, а чувство вины только растёт, начать бывает очень сложно. DopamineQuest снижает сопротивление, убирает лишний шум и помогает снова включиться через систему микро-шагов, коротких заданий и умную поддержку.",
featuresTitle:"Как работает DopamineQuest",
features:[
["ИИ-коуч помогает сдвинуться с места","Если задача кажется слишком большой и страшной, Neuro Coach разбивает её на маленькие, понятные шаги."],
["Короткие задания помогают мягко включиться","Начни с простого действия и верни себе ощущение движения."],
["Фото-подтверждение превращает маленькие шаги в реальный прогресс","Выполняй микро-шаги и подтверждай их реальными фото, чтобы видеть, что ты снова движешься вперёд."],
["Умная камера помогает зарядиться через движение","Считает повторения и проверяет технику, чтобы разбудить тело и прояснить голову."],
["Вызовы Игрок и Герой помогают перейти к реальным изменениям","Переходи от маленьких побед к более глубоким изменениям в фокусе, привычках, здоровье и качестве жизни."]
],
journeyTitle:"От залипания к движению и реальным изменениям",
journey:["Перестань застревать в мыслях","Верни себе контроль","Сделай одно простое действие","Снова начни доверять себе","Превращай маленькие победы в изменения в жизни"],
galleryTitle:"Какие скрины добавить",
galleryIntro:"",
shots:["Разорви цикл прокрастинации","Когда начать слишком сложно","Верни себе контроль","ИИ-коуч поможет сдвинуться с места","Зарядись через движение. ИИ-коуч поможет","Начни с одного простого действия","Маленькие шаги. Реальный прогресс","Меняй свою жизнь шаг за шагом"],
finalTitle:"Сделай один маленький шаг сегодня.",
finalBody:"DopamineQuest создан для моментов, когда мозг отказывается начинать.",
finalCta:"Всё остальное начнёт выстраиваться следом."
}
};

function render(lang){
  const t = data[lang];
  document.documentElement.lang = lang;
  document.getElementById('badge').textContent = t.badge;
  document.getElementById('hero-title').textContent = t.heroTitle;
  document.getElementById('hero-subtitle').textContent = t.heroSubtitle;
  document.getElementById('cta-primary').textContent = t.ctaPrimary;
  document.getElementById('cta-secondary').textContent = t.ctaSecondary;
  document.getElementById('bottom-cta').textContent = t.ctaPrimary;
  document.getElementById('pain-title').textContent = t.painTitle;
  document.getElementById('pain-body').textContent = t.painBody;
  document.getElementById('features-title').textContent = t.featuresTitle;
  document.getElementById('journey-title').textContent = t.journeyTitle;
  document.getElementById('gallery-title').textContent = t.galleryTitle;
  const galleryIntroEl = document.getElementById('gallery-intro');
  if (t.galleryIntro) {
    galleryIntroEl.textContent = t.galleryIntro;
    galleryIntroEl.style.display = 'block';
  } else {
    galleryIntroEl.textContent = '';
    galleryIntroEl.style.display = 'none';
  }
    document.getElementById('final-title').textContent = t.finalTitle;
  document.getElementById('final-body').textContent = t.finalBody;
  document.getElementById('final-cta').textContent = t.finalCta;
  document.getElementById('hero-image').src = `/screens/${lang}/1.jpg`;

  const features = document.getElementById('features');
  features.innerHTML = '';
  t.features.forEach(([title, body]) => {
    const el = document.createElement('div');
    el.className = 'feature';
    el.innerHTML = `<div class="icon"></div><h3>${title}</h3><p>${body}</p>`;
    features.appendChild(el);
  });

  const journey = document.getElementById('journey-grid');
  journey.innerHTML = '';
  t.journey.forEach((txt, i) => {
    const el = document.createElement('div');
    el.className = 'step';
    el.innerHTML = `<span class="n">0${i+1}</span>${txt}`;
    journey.appendChild(el);
  });

  const shots = document.getElementById('shots');
  shots.innerHTML = '';
  t.shots.forEach((label, i) => {
    const el = document.createElement('div');
    el.className = 'shot';
    el.innerHTML = `<div class="screen">
      <img src="/screens/${lang}/${i+1}.jpg" alt="${label}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <div style="display:none; position:absolute; inset:0; padding:20px; background:linear-gradient(180deg,#0f1629,#080b14);">
        <div class="pill"></div>
        <div style="font-size:22px;line-height:1.2;font-weight:700">${label}</div>
      </div>
    </div>`;
    shots.appendChild(el);
  });

  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
}
document.getElementById('btn-en').addEventListener('click', ()=>render('en'));
document.getElementById('btn-ru').addEventListener('click', ()=>render('ru'));
render('en');
</script>
</body>
</html>
